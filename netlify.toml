[build]
  publish = "dist"
  command = "npm run build"

[[redirects]]
  from = "/api/enquiry"
  to = "/.netlify/functions/enquiry"
  status = 200

[[redirects]]
  from = "/media/*"
  to = "/wp-content/uploads/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  directory = "netlify/functions"
